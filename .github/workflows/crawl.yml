name: Crawl and Notify Private Deploy

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force crawl regardless of update check"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: crawler-schedule
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Decide whether to crawl
        id: decide
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail
          if [[ "$FORCE" == "true" ]]; then
            echo "should_crawl=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if python -m crawler.cli check; then
            echo "should_crawl=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_crawl=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run crawler
        if: steps.decide.outputs.should_crawl == 'true'
        run: python -m crawler.cli crawl

      - name: Validate schema
        if: steps.decide.outputs.should_crawl == 'true'
        run: python scripts/validate_products_schema.py

      - name: Commit updated data
        if: steps.decide.outputs.should_crawl == 'true'
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: update crawler data [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch private deployment workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_DISPATCH_TOKEN }}
          PRIVATE_REPO: YoungseokOh/hack-the-costco
          PUBLIC_REPO: ${{ github.repository }}
          PUBLIC_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${TOKEN:-}" ]]; then
            echo "PRIVATE_REPO_DISPATCH_TOKEN is missing"
            exit 1
          fi

          DATA_VERSION="$(readlink data/current | sed 's#^versions/##' || true)"
          if [[ -z "$DATA_VERSION" ]]; then
            DATA_VERSION="unknown"
          fi

          payload=$(printf '{"event_type":"crawler_data_updated","client_payload":{"public_repo":"%s","public_sha":"%s","data_version":"%s"}}' \
            "$PUBLIC_REPO" \
            "$PUBLIC_SHA" \
            "$DATA_VERSION")

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/$PRIVATE_REPO/dispatches \
            -d "$payload"
