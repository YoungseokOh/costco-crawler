name: Crawl and Notify Private Deploy

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force crawl regardless of update check"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: crawler-schedule
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Decide whether to crawl
        id: decide
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail
          if [[ "$FORCE" == "true" ]]; then
            echo "should_crawl=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Crawl Decision"
              echo "- force: true"
              echo "- should_crawl: true"
              echo "- reason: manual_force"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          check_log="$(mktemp)"
          set +e
          python -m crawler.cli check | tee "$check_log"
          check_status=${PIPESTATUS[0]}
          set -e

          if [[ "$check_status" -eq 0 ]]; then
            echo "should_crawl=true" >> "$GITHUB_OUTPUT"
            should_crawl_value=true
          else
            echo "should_crawl=false" >> "$GITHUB_OUTPUT"
            should_crawl_value=false
          fi

          check_result_line="$(grep 'CHECK_RESULT' "$check_log" | tail -n 1 || true)"
          if [[ "$check_status" -ne 0 && -z "$check_result_line" ]]; then
            echo "crawler.cli check failed without CHECK_RESULT output"
            exit "$check_status"
          fi

          reason="$(echo "$check_result_line" | sed -n 's/.*reason=\([^ ]*\).*/\1/p')"
          notice_changed="$(echo "$check_result_line" | sed -n 's/.*notice_changed=\([^ ]*\).*/\1/p')"
          catalog_changed="$(echo "$check_result_line" | sed -n 's/.*catalog_changed=\([^ ]*\).*/\1/p')"
          catalog_count="$(echo "$check_result_line" | sed -n 's/.*catalog_count=\([^ ]*\).*/\1/p')"

          if [[ -z "$reason" ]]; then reason="unknown"; fi
          if [[ -z "$notice_changed" ]]; then notice_changed="unknown"; fi
          if [[ -z "$catalog_changed" ]]; then catalog_changed="unknown"; fi
          if [[ -z "$catalog_count" ]]; then catalog_count="unknown"; fi

          {
            echo "### Crawl Decision"
            echo "- force: false"
            echo "- should_crawl: $should_crawl_value"
            echo "- reason: $reason"
            echo "- notice_changed: $notice_changed"
            echo "- catalog_changed: $catalog_changed"
            echo "- catalog_count: $catalog_count"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run crawler
        if: steps.decide.outputs.should_crawl == 'true'
        run: python -m crawler.cli crawl

      - name: Validate schema
        if: steps.decide.outputs.should_crawl == 'true'
        run: python scripts/validate_products_schema.py

      - name: Commit updated data
        if: steps.decide.outputs.should_crawl == 'true'
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "public_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: update crawler data [skip ci]"
          git push
          echo "public_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch private deployment workflow
        if: ${{ steps.commit.outputs.changed == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true') }}
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_DISPATCH_TOKEN }}
          PRIVATE_REPO: YoungseokOh/hack-the-costco
          PUBLIC_REPO: ${{ github.repository }}
          PUBLIC_SHA: ${{ steps.commit.outputs.public_sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${TOKEN:-}" ]]; then
            echo "PRIVATE_REPO_DISPATCH_TOKEN is missing"
            exit 1
          fi

          DATA_VERSION="$(readlink data/current | sed 's#^versions/##' || true)"
          if [[ -z "$DATA_VERSION" ]]; then
            DATA_VERSION="unknown"
          fi

          payload=$(printf '{"event_type":"crawler_data_updated","client_payload":{"public_repo":"%s","public_sha":"%s","data_version":"%s"}}' \
            "$PUBLIC_REPO" \
            "$PUBLIC_SHA" \
            "$DATA_VERSION")

          response_file="$(mktemp)"
          status_code="$(curl -sS -o "$response_file" -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/$PRIVATE_REPO/dispatches \
            -d "$payload")"

          echo "Dispatch HTTP status: $status_code"
          echo "Dispatch response:"
          cat "$response_file"

          if [[ "$status_code" -lt 200 || "$status_code" -ge 300 ]]; then
            echo "Dispatch failed with status $status_code"
            exit 1
          fi
