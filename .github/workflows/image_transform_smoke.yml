name: Image Transform Smoke Test

on:
  workflow_dispatch:
    inputs:
      seed:
        description: "Optional deterministic seed for sample selection"
        required: false
        type: string

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run 3-image smoke test
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          INPUT_SEED: ${{ github.event.inputs.seed }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/image-transform-smoke
          args=()
          if [[ -n "${INPUT_SEED:-}" ]]; then
            args+=(--seed "$INPUT_SEED")
          fi
          python scripts/run_transform_smoke_test.py \
            --artifact-dir artifacts/image-transform-smoke \
            --count 3 \
            "${args[@]}"

      - name: Upload smoke-test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-transform-smoke-${{ github.run_id }}
          path: artifacts/image-transform-smoke
          if-no-files-found: warn
